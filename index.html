<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functional BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <h2>BMI Calculator BY Aura craft Labs limited</h2>
        
        <div class="input-group">
            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" placeholder="e.g., 70" min="1" step="0.1">
        </div>

        <div class="input-group">
            <label for="height">Height (cm):</label>
            <input type="number" id="height" placeholder="e.g., 175" min="1" step="1">
        </div>

        <button id="calculate-btn">Calculate BMI</button>

        <div id="result-section" class="hidden">
            <h3>Your BMI: <span id="bmi-value">0.0</span></h3>
            <p id="bmi-status"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
